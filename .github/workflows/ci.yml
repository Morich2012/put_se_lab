name: Java CI

# Ejecutar al hacer push en cualquier rama
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Obtener el código del repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Instalar JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: maven

      # 3️⃣ Ejecutar Maven dentro de 03-CI
      - name: Build and run tests
        run: mvn --batch-mode --update-snapshots verify
        working-directory: 03-CI

      # 4️⃣ (Opcional) Mostrar resultados de tests
      - name: Show Maven test results
        run: cat 03-CI/target/surefire-reports/*.txt || true
